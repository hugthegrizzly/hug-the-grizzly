media:
  input: src/assets
  output: assets

content:
  - name: posts
    label: Posts
    path: src/blog
    type: collection
    fields:
      - name: thumbnail
        label: Thumbnail
        type: image
      - name: date
        label: Date
        type: date
      - name: title
        label: Title
        type: string
      - name: published
        label: Published
        type: boolean
        default: true
      - name: description
        label: Blurb
        type: string
      - name: body
        label: Body
        type: rich-text