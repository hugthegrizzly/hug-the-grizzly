media:
  input: src/assets
  output: _public/assets

content:
  - name: posts
    label: Posts
    path: src/blog
    type: collection
    fields:
      - name: published
        label: Published
        type: boolean
        default: true
      - name: thumbnail
        label: Thumbnail
        type: image
      - name: displayDate
        label: Date
        type: date
      - name: title
        label: Title
        type: string
      - name: body
        label: Body
        type: rich-text